# Kubernetes cluster configuration
kube_network_plugin: calico
kube_apiserver_bind_address: 0.0.0.0
kube_apiserver_port: 6443
kube_proxy_mode: ipvs

# Allow swap if enabled on the host (common on single nodes)
kubelet_fail_swap_on: false

# Since it's on a single node, some defaults might need adjustment
kube_api_anonymous_auth: true

# Control Plane and Node on same machine
kube_control_plane_count: 1
kube_node_count: 1
etcd_count: 1

# Disable checking if we are on the same node
# No, let's just make it work.
# Some other useful settings
cloud_provider: undefined
bin_dir: /usr/local/bin
